<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>יומן אירועים - קשר 1891</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo-container">
                <i class="fa-solid fa-satellite-dish"></i>
            </div>
            <h1>מחלקת קשר 1891</h1>
            <p>יומן תפעול מבצעי</p>
        </header>

        <main class="main-content">
            <section class="add-report-section">
                <div class="glass-card">
                    <h2><i class="fa-solid fa-pen-to-square"></i> דיווח תפעול אירוע חדש</h2>
                    <form id="report-form">
                        <div class="input-group">
                            <label for="author">שם מדווח מלא:</label>
                            <input type="text" id="author" placeholder="לדוגמה: משה כהן" required autocomplete="name">
                        </div>
                        <div class="input-group radio-group">
                            <label>סוג הדיווח:</label>
                            <div class="radio-options">
                                <label class="radio-option">
                                    <input type="radio" name="reportType" value="event" checked>
                                    <span class="radio-custom"></span>
                                    <span>אירוע רגיל</span>
                                </label>
                                <label class="radio-option">
                                    <input type="radio" name="reportType" value="fault">
                                    <span class="radio-custom fault-custom"></span>
                                    <span>תקלה פתוחה</span>
                                </label>
                            </div>
                        </div>
                        <div class="input-group">
                            <label for="content">תיאור האירוע:</label>
                            <textarea id="content" rows="4"
                                placeholder="תאר את פרטי האירוע קצר ולעניין, פעולות שבוצעו וסטטוס עדכני..."
                                required></textarea>
                        </div>
                        <button type="submit" class="submit-btn" id="submit-btn">
                            <span>שלח דיווח עכשיו</span>
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </form>
                </div>
            </section>

            <section class="reports-feed-section">
                <div class="feed-header">
                    <h2><i class="fa-solid fa-clock-rotate-left"></i> אירועים אחרונים</h2>
                    <div class="status-indicator">
                        <span class="pulse"></span> מחובר בזמן אמת
                    </div>
                </div>

                <div id="reports-container" class="reports-container">
                    <!-- Reports will be injected here by app.js -->
                    <div class="loading-state">
                        <i class="fa-solid fa-circle-notch fa-spin"></i> טוען נתונים...
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Firebase SDK (Modular) -->
    <script type="module" src="app.js"></script>
</body>

</html>
